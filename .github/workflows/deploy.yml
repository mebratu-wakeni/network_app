# Deploy PharmaSuit API → dedicated-cloud cPanel hosts via FTPS.
# Live SQLite stays outside api/ (sibling db/); this workflow must never upload *.db.
# After a real sync: cPanel → Setup Node.js App → Restart (SSH not used).
#
# GitHub secrets (exact names used below):
#   MLTPLC_HOST, MLTPLC_USERNAME, MLTPLC_PASSWORD
#   PERLOSS_HOST, PERLOSS_USERNAME, PERLOSS_PASSWORD
#
# Remote paths (do not mix):
#   mltplc  → network-desktop-app/api/
#   perloss → network-app/api/
#
# First run per site: Actions → Deploy API (cPanel) → dry-run = true

name: Deploy API (cPanel)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which site(s) to deploy'
        type: choice
        options:
          - mltplc
          - perloss
          - both
        default: mltplc
      dry_run:
        description: 'FTPS dry-run only (no uploads)'
        type: boolean
        default: true
  # Real FTPS on push (both sites). Manual Run workflow is optional when the button is available.
  push:
    branches:
      - cloud-backend
    paths:
      - 'api/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-cpanel-${{ github.event.inputs.target || 'push' }}
  cancel-in-progress: false

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      dry_run: ${{ steps.pick.outputs.dry_run }}
    steps:
      - name: Pick sites and dry-run
        id: pick
        run: |
          mltplc='{"site":"mltplc","server_dir":"network-desktop-app/api/","live_db_hint":"network-desktop-app/db/"}'
          perloss='{"site":"perloss","server_dir":"network-app/api/","live_db_hint":"network-app/db/"}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.target }}" in
              mltplc)  echo "matrix={\"include\":[$mltplc]}" >> "$GITHUB_OUTPUT" ;;
              perloss) echo "matrix={\"include\":[$perloss]}" >> "$GITHUB_OUTPUT" ;;
              both)    echo "matrix={\"include\":[$mltplc,$perloss]}" >> "$GITHUB_OUTPUT" ;;
              *) echo "::error::Unknown target"; exit 1 ;;
            esac
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            # Push: FTPS both sites (same as mltplc; no Run workflow button needed)
            echo "matrix={\"include\":[$mltplc,$perloss]}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: select
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — refuse to sync if SQLite files exist under api/
        run: |
          set -euo pipefail
          hits="$(find api -type f \( \
            -name '*.db' -o -name '*.db-wal' -o -name '*.db-shm' \
            -o -name '*.sqlite' -o -name '*.sqlite-*' \
            -o -name 'pharmasuit_lan.db*' \
          \) 2>/dev/null || true)"
          if [ -n "$hits" ]; then
            echo "::error::SQLite files present under api/ — refusing deploy (would risk live DB)."
            echo "$hits"
            exit 1
          fi
          echo "OK: no SQLite files under api/"

      - name: Require MLTPLC_* secrets
        if: matrix.site == 'mltplc'
        env:
          MLTPLC_HOST: ${{ secrets.MLTPLC_HOST }}
          MLTPLC_USERNAME: ${{ secrets.MLTPLC_USERNAME }}
          MLTPLC_PASSWORD: ${{ secrets.MLTPLC_PASSWORD }}
        run: |
          missing=0
          [ -z "$MLTPLC_HOST" ] && echo "Missing secret: MLTPLC_HOST" && missing=1
          [ -z "$MLTPLC_USERNAME" ] && echo "Missing secret: MLTPLC_USERNAME" && missing=1
          [ -z "$MLTPLC_PASSWORD" ] && echo "Missing secret: MLTPLC_PASSWORD" && missing=1
          exit $missing

      - name: Require PERLOSS_* secrets
        if: matrix.site == 'perloss'
        env:
          PERLOSS_HOST: ${{ secrets.PERLOSS_HOST }}
          PERLOSS_USERNAME: ${{ secrets.PERLOSS_USERNAME }}
          PERLOSS_PASSWORD: ${{ secrets.PERLOSS_PASSWORD }}
        run: |
          missing=0
          [ -z "$PERLOSS_HOST" ] && echo "Missing secret: PERLOSS_HOST" && missing=1
          [ -z "$PERLOSS_USERNAME" ] && echo "Missing secret: PERLOSS_USERNAME" && missing=1
          [ -z "$PERLOSS_PASSWORD" ] && echo "Missing secret: PERLOSS_PASSWORD" && missing=1
          exit $missing

      - name: FTPS sync api/ → mltplc (${{ matrix.server_dir }})
        if: matrix.site == 'mltplc'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.MLTPLC_HOST }}
          username: ${{ secrets.MLTPLC_USERNAME }}
          password: ${{ secrets.MLTPLC_PASSWORD }}
          protocol: ftps
          local-dir: api/
          server-dir: ${{ matrix.server_dir }}
          dangerous-clean-slate: false
          dry-run: ${{ needs.select.outputs.dry_run == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/data/**
            **/uploads/**
            **/coverage/**
            **/admin-dist/**
            **/tests/**
            **/*.md
            **/.DS_Store
            **/._*
            **/*.db
            **/*.db-wal
            **/*.db-shm
            **/*.sqlite
            **/*.sqlite-*
            **/pharmasuit_lan.db*
            **/startup-error.log
            **/test-api.js

      - name: FTPS sync api/ → perloss (${{ matrix.server_dir }})
        if: matrix.site == 'perloss'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PERLOSS_HOST }}
          username: ${{ secrets.PERLOSS_USERNAME }}
          password: ${{ secrets.PERLOSS_PASSWORD }}
          protocol: ftps
          local-dir: api/
          server-dir: ${{ matrix.server_dir }}
          dangerous-clean-slate: false
          dry-run: ${{ needs.select.outputs.dry_run == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/data/**
            **/uploads/**
            **/coverage/**
            **/admin-dist/**
            **/tests/**
            **/*.md
            **/.DS_Store
            **/._*
            **/*.db
            **/*.db-wal
            **/*.db-shm
            **/*.sqlite
            **/*.sqlite-*
            **/pharmasuit_lan.db*
            **/startup-error.log
            **/test-api.js

      - name: Summary
        run: |
          {
            echo "### Deploy API — ${{ matrix.site }}"
            echo "- **Remote:** \`${{ matrix.server_dir }}\` (code only)"
            echo "- **Live DB (untouched):** \`${{ matrix.live_db_hint }}\`"
            echo "- **Dry-run:** \`${{ needs.select.outputs.dry_run }}\`"
            echo ""
            if [ "${{ needs.select.outputs.dry_run }}" = "true" ]; then
              echo "Next: re-run with **dry-run = false**, then **cPanel → Setup Node.js App → Restart**."
            else
              echo "FTPS upload done. Restart the Node app in that site’s cPanel, then smoke-test login."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
