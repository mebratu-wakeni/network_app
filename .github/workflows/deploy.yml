# Deploy PharmaSuit API → mltplc.com (cPanel) via FTPS.
# Live SQLite stays outside api/ (sibling db/); this workflow must never upload *.db.
#
# Secrets (repo → Settings → Secrets → Actions):
#   MLTPLC_HOST, MLTPLC_USERNAME, MLTPLC_PASSWORD
# Optional later:
#   MLTPLC_SSH_KEY, MLTPLC_SSH_PORT (default 22) — for npm install / migrate / restart
#
# First run: Actions → Deploy API (mltplc) → Run workflow → dry-run = true

name: Deploy API (mltplc)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'FTPS dry-run only (no uploads)'
        type: boolean
        default: true
      run_ssh:
        description: 'After FTPS, SSH npm install + restart (needs SSH access)'
        type: boolean
        default: false
      run_migrate:
        description: 'Also run knex migrate over SSH (only with run_ssh)'
        type: boolean
        default: false
  # Real FTPS sync (not dry-run). Prefer a manual dry-run once before relying on this.
  # Path filter omits this workflow file so editing deploy.yml alone does not upload.
  push:
    branches:
      - cloud-backend
    paths:
      - 'api/**'

concurrency:
  group: deploy-mltplc
  cancel-in-progress: false

jobs:
  deploy-mltplc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require MLTPLC FTPS secrets
        env:
          MLTPLC_HOST: ${{ secrets.MLTPLC_HOST }}
          MLTPLC_USERNAME: ${{ secrets.MLTPLC_USERNAME }}
          MLTPLC_PASSWORD: ${{ secrets.MLTPLC_PASSWORD }}
        run: |
          missing=0
          [ -z "$MLTPLC_HOST" ] && echo "Missing secret: MLTPLC_HOST" && missing=1
          [ -z "$MLTPLC_USERNAME" ] && echo "Missing secret: MLTPLC_USERNAME" && missing=1
          [ -z "$MLTPLC_PASSWORD" ] && echo "Missing secret: MLTPLC_PASSWORD" && missing=1
          exit $missing

      - name: Guard — refuse to sync if SQLite files exist under api/
        run: |
          set -euo pipefail
          hits="$(find api -type f \( \
            -name '*.db' -o -name '*.db-wal' -o -name '*.db-shm' \
            -o -name '*.sqlite' -o -name '*.sqlite-*' \
            -o -name 'pharmasuit_lan.db*' \
          \) 2>/dev/null || true)"
          if [ -n "$hits" ]; then
            echo "::error::SQLite files present under api/ — refusing deploy (would risk live DB)."
            echo "$hits"
            exit 1
          fi
          echo "OK: no SQLite files under api/"

      - name: Resolve deploy options
        id: opts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "run_ssh=${{ inputs.run_ssh }}" >> "$GITHUB_OUTPUT"
            echo "run_migrate=${{ inputs.run_migrate }}" >> "$GITHUB_OUTPUT"
          else
            # Push: real sync; SSH/migrate stay off until keys are configured
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "run_ssh=false" >> "$GITHUB_OUTPUT"
            echo "run_migrate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: FTPS sync api/ → network-desktop-app/api/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.MLTPLC_HOST }}
          username: ${{ secrets.MLTPLC_USERNAME }}
          password: ${{ secrets.MLTPLC_PASSWORD }}
          protocol: ftps
          local-dir: api/
          # Existing mltplc tarball layout (do not sync parent live db/)
          server-dir: network-desktop-app/api/
          dangerous-clean-slate: false
          dry-run: ${{ steps.opts.outputs.dry_run == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/data/**
            **/uploads/**
            **/coverage/**
            **/admin-dist/**
            **/tests/**
            **/*.md
            **/.DS_Store
            **/._*
            **/*.db
            **/*.db-wal
            **/*.db-shm
            **/*.sqlite
            **/*.sqlite-*
            **/pharmasuit_lan.db*
            **/startup-error.log
            **/test-api.js

      # SSH host is often mltplc.com (not ftp.mltplc.com). Set MLTPLC_SSH_HOST if needed.
      # Add `key: ${{ secrets.MLTPLC_SSH_KEY }}` once a deploy key is installed in cPanel.
      - name: SSH — npm install, optional migrate, Passenger restart
        if: steps.opts.outputs.run_ssh == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MLTPLC_SSH_HOST || secrets.MLTPLC_HOST }}
          username: ${{ secrets.MLTPLC_USERNAME }}
          password: ${{ secrets.MLTPLC_PASSWORD }}
          port: ${{ secrets.MLTPLC_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            APP="$HOME/network-desktop-app/api"
            VENV="$HOME/nodevenv/network-desktop-app/api/20/bin/activate"
            if [ -f "$VENV" ]; then
              # shellcheck disable=SC1090
              source "$VENV"
            fi
            cd "$APP"
            find db -name '._*' -type f -delete 2>/dev/null || true
            npm install --omit=dev
            if [ "${{ steps.opts.outputs.run_migrate }}" = "true" ]; then
              echo "==> migrate (schema only; does not replace the .db file)"
              npm run migrate
            else
              echo "==> skip migrate"
            fi
            mkdir -p tmp
            touch tmp/restart.txt
            echo "==> touched tmp/restart.txt"

      - name: Summary
        run: |
          {
            echo "### Deploy API (mltplc)"
            echo "- **Host:** FTPS → \`${{ secrets.MLTPLC_HOST }}\`"
            echo "- **Remote:** \`network-desktop-app/api/\` (code only)"
            echo "- **Dry-run:** \`${{ steps.opts.outputs.dry_run }}\`"
            echo "- **SSH steps:** \`${{ steps.opts.outputs.run_ssh }}\`"
            echo "- **Migrate:** \`${{ steps.opts.outputs.run_migrate }}\`"
            echo ""
            echo "Live SQLite must remain at sibling \`network-desktop-app/db/\` (never uploaded)."
            if [ "${{ steps.opts.outputs.dry_run }}" = "true" ]; then
              echo ""
              echo "Next: re-run with **dry-run = false**. Without SSH, restart the Node app in cPanel after a real sync."
            elif [ "${{ steps.opts.outputs.run_ssh }}" != "true" ]; then
              echo ""
              echo "FTPS upload done. Restart via **cPanel → Setup Node.js App** (or enable SSH and re-run with **run_ssh**)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
