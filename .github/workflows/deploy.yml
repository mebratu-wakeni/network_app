name: Deploy to cPanel

on:
  push:
    branches:
      - cloud-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy via SSH rsync
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        ARGS: "-rlgoDzvO --delete"
        SOURCE: "api/" 
        REMOTE_HOST: ${{ secrets.SERVER_HOST }}
        REMOTE_USER: mltplcpi
        PORT: 7822 # <-- A2 Hosting's custom SSH port
        TARGET: "/home/mltplcpi/network-desktop-app/api" 
        EXCLUDE: "/node_modules/, /tests/, *.sqlite"

    - name: Install Dependencies, Run Migrations, and Restart
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: mltplcpi
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 7822 # <-- A2 Hosting's custom SSH port here too
        script: |
          source /home/mltplcpi/nodevenv/network-desktop-app/api/20/bin/activate && cd /home/mltplcpi/network-desktop-app/api
          npm install --production
          npm run migrate
          mkdir -p tmp
          touch tmp/restart.txt