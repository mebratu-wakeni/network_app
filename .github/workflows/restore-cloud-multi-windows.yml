# Restore Windows installers to downloads/cloud-multi/ from a prior
# cloud-desktop-win Actions artifact (exe files went missing on the host).
#
# Secrets: DOWNLOADS_HOST, DOWNLOADS_USERNAME, DOWNLOADS_PASSWORD,
#          DOWNLOADS_SERVER_DIR (must be …/downloads/cloud-multi/)

name: Restore cloud-multi Windows installers

on:
  workflow_dispatch:
    inputs:
      artifact_id:
        description: "GitHub Actions artifact id for cloud-desktop-win"
        required: true
        default: "8360403538"
      version:
        description: "Version folder under cloud-multi"
        required: true
        default: "1.0.2"

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p staging/raw staging/ftp/"$VERSION"
          echo "Downloading artifact ${ARTIFACT_ID}…"
          curl -fL --retry 10 --retry-delay 2 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o staging/win.zip
          ls -lh staging/win.zip
          unzip -q staging/win.zip -d staging/raw
          find staging/raw -type f | sort

          # Copy installers into version folder for FTPS
          find staging/raw -type f \( -iname '*.exe' -o -iname '*windows*.blockmap' \) -print0 \
            | while IFS= read -r -d '' f; do
                cp -v "$f" "staging/ftp/${VERSION}/"
              done

          ls -lah "staging/ftp/${VERSION}"
          WIN32=$(find "staging/ftp/${VERSION}" -maxdepth 1 -type f -iname '*ia32*Setup.exe' -printf '%f\n' | head -n1 || true)
          WIN64=$(find "staging/ftp/${VERSION}" -maxdepth 1 -type f -iname '*x64*Setup.exe' -printf '%f\n' | head -n1 || true)
          echo "WIN64=${WIN64:-}" >> "$GITHUB_ENV"
          echo "WIN32=${WIN32:-}" >> "$GITHUB_ENV"
          if [ -z "${WIN64:-}" ] && [ -z "${WIN32:-}" ]; then
            echo "ERROR: no *Setup.exe files in artifact"
            exit 1
          fi

      - name: Write latest.json with correct Windows filenames
        env:
          VERSION: ${{ inputs.version }}
          BASE_URL: https://server.masatechplc.com/downloads/cloud-multi
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os
          from datetime import datetime, timezone
          version = os.environ["VERSION"]
          base = os.environ["BASE_URL"].rstrip("/")
          win64 = os.environ.get("WIN64", "").strip()
          win32 = os.environ.get("WIN32", "").strip()
          artifacts = {
            "mac": {
              "file": f"PharmaSuit-Cloud-Mac-{version}-Installer.dmg",
              "url": f"{base}/{version}/PharmaSuit-Cloud-Mac-{version}-Installer.dmg",
            },
            "linux": {
              "file": f"PharmaSuit-Cloud-Linux-{version}.AppImage",
              "url": f"{base}/{version}/PharmaSuit-Cloud-Linux-{version}.AppImage",
            },
          }
          if win64:
              artifacts["win"] = {"file": win64, "url": f"{base}/{version}/{win64}"}
          if win32:
              artifacts["win32"] = {"file": win32, "url": f"{base}/{version}/{win32}"}
          latest = {
            "product": "PharmaSuit Cloud (multi-tenant)",
            "channel": "cloud-multi",
            "version": version,
            "releaseNotes": f"PharmaSuit Cloud {version}",
            "publishedAt": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.%f")[:-3] + "Z",
            "artifacts": artifacts,
          }
          path = "staging/ftp/latest.json"
          with open(path, "w", encoding="utf-8") as f:
              json.dump(latest, f, indent=2)
              f.write("\n")
          print(open(path, encoding="utf-8").read())
          PY
          find staging/ftp -type f | sort

      - name: Check downloads secrets
        env:
          DOWNLOADS_HOST: ${{ secrets.DOWNLOADS_HOST }}
          DOWNLOADS_USERNAME: ${{ secrets.DOWNLOADS_USERNAME }}
          DOWNLOADS_PASSWORD: ${{ secrets.DOWNLOADS_PASSWORD }}
          DOWNLOADS_SERVER_DIR: ${{ secrets.DOWNLOADS_SERVER_DIR }}
        run: |
          missing=0
          [ -z "$DOWNLOADS_HOST" ] && echo "Missing DOWNLOADS_HOST" && missing=1
          [ -z "$DOWNLOADS_USERNAME" ] && echo "Missing DOWNLOADS_USERNAME" && missing=1
          [ -z "$DOWNLOADS_PASSWORD" ] && echo "Missing DOWNLOADS_PASSWORD" && missing=1
          [ -z "$DOWNLOADS_SERVER_DIR" ] && echo "Missing DOWNLOADS_SERVER_DIR" && missing=1
          echo "DOWNLOADS_SERVER_DIR=$DOWNLOADS_SERVER_DIR"
          exit $missing

      - name: Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DOWNLOADS_HOST }}
          username: ${{ secrets.DOWNLOADS_USERNAME }}
          password: ${{ secrets.DOWNLOADS_PASSWORD }}
          protocol: ftps
          local-dir: staging/ftp/
          server-dir: ${{ secrets.DOWNLOADS_SERVER_DIR }}
          dangerous-clean-slate: false

      - name: Summary
        run: |
          echo "### Restored cloud-multi Windows installers" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- win64: \`${{ env.WIN64 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- win32: \`${{ env.WIN32 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Page: https://server.masatechplc.com/downloads/cloud-multi/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If .exe vanish again, ask the host about executable quarantine/Imunify." >> "$GITHUB_STEP_SUMMARY"
