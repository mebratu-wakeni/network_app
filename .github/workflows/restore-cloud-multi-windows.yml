# Restore cloud-multi installers via FTPS put-only (never deletes remote siblings).
# SSH from GitHub Actions timed out; FTPS secrets already work for downloads/*.
#
# Secrets:
#   DOWNLOADS_HOST, DOWNLOADS_USERNAME, DOWNLOADS_PASSWORD
#   DOWNLOADS_SERVER_DIR — e.g. server.masatechplc.com/downloads/cloud-multi/

name: Restore cloud-multi Windows installers

on:
  workflow_dispatch:
    inputs:
      win_artifact_id:
        description: "cloud-desktop-win artifact id"
        required: true
        default: "8360403538"
      mac_artifact_id:
        description: "cloud-desktop-mac artifact id"
        required: true
        default: "8360390397"
      linux_artifact_id:
        description: "cloud-desktop-linux artifact id"
        required: true
        default: "8360377791"
      version:
        description: "Version folder"
        required: true
        default: "1.0.2"

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          WIN_ID: ${{ inputs.win_artifact_id }}
          MAC_ID: ${{ inputs.mac_artifact_id }}
          LINUX_ID: ${{ inputs.linux_artifact_id }}
        run: |
          set -euo pipefail
          mkdir -p staging/raw staging/out/"$VERSION"

          download() {
            local id="$1" name="$2"
            echo "Downloading $name ($id)…"
            curl -fL --retry 10 --retry-delay 2 --retry-all-errors \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${id}/zip" \
              -o "staging/${name}.zip"
            ls -lh "staging/${name}.zip"
            unzip -q "staging/${name}.zip" -d "staging/raw/${name}"
          }

          download "$WIN_ID" win
          download "$MAC_ID" mac
          download "$LINUX_ID" linux

          # Only public installers + blockmaps (skip unpacked PharmaSuit.exe / elevate.exe).
          find staging/raw -type f \( \
              -iname '*-x64-Setup.exe' -o -iname '*-ia32-Setup.exe' -o \
              -iname '*.dmg' -o -iname '*.AppImage' -o -iname '*.appimage' -o \
              -iname '*Setup.exe.blockmap' -o -iname '*.dmg.blockmap' \
            \) ! -iname 'elevate.exe' -print0 | while IFS= read -r -d '' f; do
              base=$(basename "$f")
              case "$base" in
                PharmaSuit.exe|elevate.exe) continue ;;
              esac
              cp -v "$f" "staging/out/${VERSION}/"
            done

          ls -lah "staging/out/${VERSION}"

          WIN32=$(find "staging/out/${VERSION}" -maxdepth 1 -type f -iname '*ia32*Setup.exe' ! -iname '*.blockmap' -printf '%f\n' | head -n1 || true)
          WIN64=$(find "staging/out/${VERSION}" -maxdepth 1 -type f -iname '*x64*Setup.exe' ! -iname '*.blockmap' -printf '%f\n' | head -n1 || true)
          MAC=$(find "staging/out/${VERSION}" -maxdepth 1 -type f -iname '*.dmg' ! -iname '*.blockmap' -printf '%f\n' | head -n1 || true)
          LINUX=$(find "staging/out/${VERSION}" -maxdepth 1 -type f \( -iname '*.AppImage' -o -iname '*.appimage' \) -printf '%f\n' | head -n1 || true)

          {
            echo "WIN64=$WIN64"
            echo "WIN32=$WIN32"
            echo "MAC=$MAC"
            echo "LINUX=$LINUX"
          } >> "$GITHUB_ENV"

          test -n "${WIN64:-}" && test -n "${WIN32:-}" && test -n "${MAC:-}" && test -n "${LINUX:-}"
          test "$(stat -c%s "staging/out/${VERSION}/${WIN64}")" -gt 1000000
          test "$(stat -c%s "staging/out/${VERSION}/${WIN32}")" -gt 1000000

      - name: Write latest.json
        env:
          VERSION: ${{ inputs.version }}
          BASE_URL: https://server.masatechplc.com/downloads/cloud-multi
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os
          from datetime import datetime, timezone
          version = os.environ["VERSION"]
          base = os.environ["BASE_URL"].rstrip("/")
          def art(name):
              return {"file": name, "url": f"{base}/{version}/{name}"}
          latest = {
            "product": "PharmaSuit Cloud (multi-tenant)",
            "channel": "cloud-multi",
            "version": version,
            "releaseNotes": f"PharmaSuit Cloud {version}",
            "publishedAt": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.%f")[:-3] + "Z",
            "artifacts": {
              "mac": art(os.environ["MAC"]),
              "win": art(os.environ["WIN64"]),
              "win32": art(os.environ["WIN32"]),
              "linux": art(os.environ["LINUX"]),
            },
          }
          with open("staging/out/latest.json", "w", encoding="utf-8") as f:
              json.dump(latest, f, indent=2)
              f.write("\n")
          print(open("staging/out/latest.json", encoding="utf-8").read())
          PY

      - name: FTPS put-only upload (no deletes)
        env:
          HOST: ${{ secrets.DOWNLOADS_HOST }}
          USER: ${{ secrets.DOWNLOADS_USERNAME }}
          PASS: ${{ secrets.DOWNLOADS_PASSWORD }}
          SERVER_DIR: ${{ secrets.DOWNLOADS_SERVER_DIR }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          test -n "${HOST:-}" && test -n "${USER:-}" && test -n "${PASS:-}"
          DEST="${SERVER_DIR:-server.masatechplc.com/downloads/cloud-multi}"
          DEST="${DEST#/}"
          DEST="${DEST%/}"
          case "$DEST" in
            *cloud-multi*) ;;
            *) echo "DOWNLOADS_SERVER_DIR must point at cloud-multi (got: $DEST)"; exit 1 ;;
          esac

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          # Put files only — never mirror/delete.
          lftp -c "
          set cmd:fail-exit yes
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set net:max-retries 5
          set net:timeout 120
          set net:reconnect-interval-base 5
          set xfer:clobber on
          open -u ${USER},${PASS} ${HOST}
          # -f: ignore "directory already exists" (550) so re-runs succeed
          mkdir -pf ${DEST}/${VERSION}
          cd ${DEST}/${VERSION}
          lcd staging/out/${VERSION}
          mput *
          cd ..
          lcd ..
          put latest.json -o latest.json
          echo '--- remote version dir ---'
          cls -l ${DEST}/${VERSION}
          echo '--- latest.json ---'
          cat ${DEST}/latest.json
          bye
          "

      - name: Verify public HTTP URLs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          BASE="https://server.masatechplc.com/downloads/cloud-multi"
          # Allow host a moment to flush / antivirus scan.
          sleep 15
          fail=0
          for name in "$WIN64" "$WIN32" "$MAC" "$LINUX"; do
            url="${BASE}/${VERSION}/${name}"
            code=$(curl -sS -o /dev/null -w '%{http_code}' -L --max-time 60 -I "$url" || echo 000)
            clen=$(curl -sS -L --max-time 60 -I "$url" | awk -F': ' 'tolower($1)=="content-length"{gsub(/\r/,"",$2); print $2; exit}')
            echo "$name -> HTTP $code Content-Length=${clen:-?}"
            if [ "$code" != "200" ] || [ -z "${clen:-}" ] || [ "${clen:-0}" -lt 1000000 ]; then
              echo "FAIL: $url"
              fail=1
            fi
          done
          curl -sS -L --max-time 30 "${BASE}/latest.json" | head -c 800
          echo
          exit "$fail"

      - name: Summary
        if: always()
        run: |
          echo "### Restored cloud-multi installers via FTPS put-only" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- win64 \`${{ env.WIN64 }}\` / win32 \`${{ env.WIN32 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- mac \`${{ env.MAC }}\` / linux \`${{ env.LINUX }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- https://server.masatechplc.com/downloads/cloud-multi/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If Windows .exe vanish again after verify, ask host about Imunify/AV quarantine." >> "$GITHUB_STEP_SUMMARY"
