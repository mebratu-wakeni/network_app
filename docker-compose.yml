services:
  db:
    image: postgres:15
    container_name: pharma-app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pharma_dev
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./api
      args:  
        NODE_ENV: development
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=pharma_dev
      - PORT=4000
      - NODE_ENV=development
      - IS_DOCKER=true
      - FRONTEND_ORIGIN=http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      - db
    volumes:
      - ./api:/app
      - /app/node_modules
    command: > 
      sh -c "
        echo 'Waiting for Postgres at db:5432...';
        until pg_isready -h db -p 5432 -U postgres > /dev/null 2>&1; do
          echo 'Waiting for Postgres...';
          sleep 2;
        done;
        echo 'Postgres is ready — running migrations';
        cd /app && npx knex migrate:latest --knexfile db/knexfile.js || echo 'Migration failed or already up to date';
        echo 'Starting server...';
        npm run dev;
      "
volumes:
  db-data:
