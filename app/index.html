<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaSaTech Software Solution</title>
    <!--
      Content Security Policy
      ─────────────────────────────────────────────────────────────────────────
      script-src  : 'self' + app: (Electron custom protocol for packaged build)
                    'unsafe-eval' required by Vite's module bundler in dev mode
      style-src   : 'unsafe-inline' required by Tailwind's runtime class injection
      img-src     : https: allows product/avatar images served from the cloud API
                    data:/blob: for canvas exports and local thumbnail previews
      connect-src : ws/wss localhost — Vite HMR websocket in dev
                    http localhost — dev API server health checks
                    All actual cloud API calls go through Electron IPC (not fetch)
                    so no cloud domain is needed here.
      ─────────────────────────────────────────────────────────────────────────
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' app:;
      script-src  'self' app: 'unsafe-eval';
      style-src   'self' app: 'unsafe-inline';
      img-src     'self' app: data: blob: https:;
      connect-src 'self' app: ws://localhost:* wss://localhost:* http://localhost:*;
      font-src    'self' app: data:;
      object-src  'none';
    ">
  </head>
  <body>
    <div id="app">
      <div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#f9fafb;">
        <div style="width:min(420px,86vw);font-family:Inter,Arial,sans-serif;color:#111827;">
          <div style="font-size:20px;font-weight:700;margin-bottom:8px;">MaSaTech</div>
          <div style="font-size:13px;color:#6b7280;margin-bottom:10px;">Starting application...</div>
          <div style="height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;">
            <div style="height:100%;width:30%;background:#4f46e5;animation:bootPulse 1.1s ease-in-out infinite;"></div>
          </div>
        </div>
      </div>
    </div>
    <style>
      @keyframes bootPulse {
        0% { width: 20%; }
        50% { width: 65%; }
        100% { width: 35%; }
      }
    </style>

    <script src="lib/Liteframe.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
